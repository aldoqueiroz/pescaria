name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: padrao

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login no Docker Hub
      uses: docker/login-action@v3
      
      with:
        username: aldoqjr@gmail.com
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build da imagem
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/pescaria:latest .

    - name: Push da imagem
      run: docker push ${{ secrets.DOCKER_USERNAME }}/pescaria:latest
